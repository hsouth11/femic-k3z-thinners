variant_id: ctfert_l20h0
label: "K3Z optional CT + fert subvariant (L20/M10/H0)"
description: "Optional K3Z Patchworks CT/fert subvariant with six CT-eligible AUs, curated RETENTION overlay, and SI-specific fert boosts of L=20%, M=10%, with fert disabled on H-class AUs."
patchworks:
  runtime_config: config/patchworks.runtime.ctfert_l20h0.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/ctfert_l20h0.pin
  tracks_dir: models/k3z_patchworks_model/tracks_ctfert_l20h0
  forestmodel_xml: output/patchworks_k3z_ctfert_l20h0_validated/forestmodel.xml
  fragments_shapefile: output/patchworks_k3z_ctfert_l20h0_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.ctfert_l20h0.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_ctfert_l20h0_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.ctfert_l20h0.yaml
  publish_forestmodel_note: >-
    Treat the export primarily as the canonical CT/fert ForestModel refresh.
    The accepted CT/fert subvariant fragments surface must stay aligned to the
    curated 218-fragment CT/fert retention overlay in
    tmp/CTFert Fragments/fragments_updated3_Usedinbasecase.shp; after export,
    replace the raw fragments surface with the curated overlay before Matrix
    Builder and copy the fresh forestmodel.xml to
    output/patchworks_k3z_ctfert_l20h0_validated/forestmodel.xml.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.ctfert_l20h0.windows.yaml --run-id k3z_ctfert_l20h0
notes:
  - "Use this subvariant when CT/QMD/F1/F2/F3 behavior is wanted with L=20%, M=10%, and no fert at all on H-class AUs."
  - "Patchworks launch entrypoint: analysis/ctfert_l20h0.pin"
  - "Canonical rebuild contract: refresh ForestModel from current bundle/checkpoint inputs, then matrix-build against the accepted curated CT/fert RETENTION overlay surface."

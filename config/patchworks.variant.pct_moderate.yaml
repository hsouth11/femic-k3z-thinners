variant_id: pct_moderate
label: "K3Z optional PCT moderate subvariant"
description: "Single-intensity K3Z PCT-only subvariant with moderate PCT (remove 2000 HW stems/ha)."
patchworks:
  runtime_config: config/patchworks.runtime.pct_moderate.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/pct_moderate.pin
  tracks_dir: models/k3z_patchworks_model/tracks_pct_moderate
  forestmodel_xml: models/k3z_patchworks_model/yield/forestmodel_pct_moderate.xml
  fragments_shapefile: output/patchworks_k3z_pct_moderate_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.pct_moderate.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_pct_moderate_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.pct_moderate.yaml
  publish_forestmodel_note: >-
    Treat the export primarily as the canonical PCT-only moderate-subvariant
    ForestModel refresh. The accepted fragments surface must stay aligned to
    the baseline 218-fragment teaching footprint exactly with no
    AU/IFM/RETENTION/ORIGIN/SILV_STATE drift before matrix build.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.pct_moderate.windows.yaml --run-id k3z_pct_moderate
notes:
  - "Use this subvariant when a moderate PCT-only teaching surface is required."
  - "Patchworks launch entrypoint: analysis/pct_moderate.pin"

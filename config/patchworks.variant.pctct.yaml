variant_id: pctct
label: "K3Z optional PCT + CT variant"
description: "Optional K3Z Patchworks variant with pre-commercial thinning followed by commercial thinning, compiled into a distinct tracks surface."
patchworks:
  runtime_config: config/patchworks.runtime.pctct.windows.yaml
  analysis_pin: models/k3z_patchworks_model/analysis/pctct.pin
  tracks_dir: models/k3z_patchworks_model/tracks_pctct
  forestmodel_xml: models/k3z_patchworks_model/yield/forestmodel_pctct.xml
  fragments_shapefile: output/patchworks_k3z_pctct_validated/fragments/fragments.shp
  silviculture_config: config/silviculture.k3z.pctct.yaml
build:
  export_command: >-
    femic export patchworks --tsa k3z --instance-root external/femic-k3z-instance
    --output-dir output/patchworks_k3z_pctct_validated --seral-stage-config config/seral.k3z.yaml
    --silviculture-config config/silviculture.k3z.pctct.yaml
  publish_forestmodel_note: >-
    Treat the export primarily as the canonical PCT->CT ForestModel refresh.
    The accepted PCT->CT fragments surface must stay aligned to the baseline
    218-fragment teaching footprint exactly; unlike CT/fert, this variant does
    not apply any variant-specific fragment retention overrides on top of that
    shared geometry surface. Before matrix build, confirm the checked-in
    output/patchworks_k3z_pctct_validated/fragments/ surface still matches the
    baseline geometry footprint with no AU/IFM/RETENTION/ORIGIN/SILV_STATE
    drift, then copy the fresh forestmodel.xml to
    models/k3z_patchworks_model/yield/forestmodel_pctct.xml.
  matrix_build_command: >-
    femic patchworks matrix-build --instance-root external/femic-k3z-instance
    --config config/patchworks.runtime.pctct.windows.yaml --run-id k3z_pctct
notes:
  - "Use this variant when a PCT gate is required before CT."
  - "Patchworks launch entrypoint: analysis/pctct.pin"
  - "Canonical rebuild contract: refresh ForestModel from current bundle/checkpoint inputs, then matrix-build against the accepted 218-fragment PCT->CT surface."

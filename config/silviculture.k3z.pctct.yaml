pre_commercial_thinning:
  enabled: true
  state_field: "SILV_STATE"
  from_state: "cc_pl"
  to_state: "cc_pl_pct"
  eligible_au_ids:
    - 985502001  # FDC+HW-M
    - 985502002  # CW+HW-M
  min_origin: "planted"
  age_by_au:
    985502001: 10
    985502002: 10
  residual_stems_per_ha: 900
  remove_species:
    - "HW"

commercial_thinning:
  enabled: true
  state_field: "SILV_STATE"
  from_state: "cc_pl_pct"
  to_state: "cc_pl_pct_ct"
  eligible_au_ids:
    - 985502001  # FDC+HW-M
    - 985502002  # CW+HW-M
  min_origin: "planted"
  age_by_au:
    985502001: 40
    985502002: 40
  basal_area_removal_fraction: 0.30
  basal_area_to_volume_ratio: 1.0

fertilization:
  enabled: false
  state_field: "SILV_STATE"
  response_years: 10
  growth_speedup_fraction: 0.10
  first_application:
    from_state: "cc_pl_pct_ct"
    to_state: "cc_pl_pct_ct_f1"
    timing_rule: "cai_argmax"

qmd:
  enabled: true
  source: "synthetic"
  notes: "Placeholder AU-wise QMD curves for PCT/CT scaffolding until observed or Nemora-derived curves are supplied."

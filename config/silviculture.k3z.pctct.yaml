pre_commercial_thinning:
  enabled: true
  state_field: "SILV_STATE"
  eligible_au_ids:
    - 985502000  # HW+FDC-M
    - 985503000  # HW+FDC-H
    - 985502001  # FDC+HW-M
    - 985503001  # FDC+HW-H
  min_origin: "planted"
  source_total_stems_per_ha: 4000
  age_by_au:
    985502000: 10
    985503000: 10
    985502001: 10
    985503001: 10
  residual_stems_per_ha: 900
  treatments:
    - label: "PCT_LIGHT"
      from_state: "cc_pl"
      to_state: "cc_pl_pct_light"
      ct_to_state: "cc_pl_pct_light_ct"
      remove_species:
        - "HW"
      remove_stems_per_ha:
        HW: 1000
    - label: "PCT_MODERATE"
      from_state: "cc_pl"
      to_state: "cc_pl_pct_moderate"
      ct_to_state: "cc_pl_pct_moderate_ct"
      remove_species:
        - "HW"
      remove_stems_per_ha:
        HW: 2000
    - label: "PCT_HEAVY"
      from_state: "cc_pl"
      to_state: "cc_pl_pct_heavy"
      ct_to_state: "cc_pl_pct_heavy_ct"
      remove_species:
        - "HW"
      remove_stems_per_ha:
        HW: 3000

commercial_thinning:
  enabled: true
  state_field: "SILV_STATE"
  eligible_au_ids:
    - 985502000  # HW+FDC-M
    - 985503000  # HW+FDC-H
    - 985502001  # FDC+HW-M
    - 985503001  # FDC+HW-H
  min_origin: "planted"
  age_by_au:
    985502000: 40
    985503000: 40
    985502001: 40
    985503001: 40
  basal_area_removal_fraction: 0.30
  basal_area_to_volume_ratio: 1.0

fertilization:
  enabled: false
  state_field: "SILV_STATE"
  response_years: 10
  growth_speedup_fraction: 0.10
  first_application:
    from_state: "cc_pl_pct_ct"
    to_state: "cc_pl_pct_ct_f1"
    timing_rule: "cai_argmax"

qmd:
  enabled: true
  source: "synthetic"
  notes: "Placeholder AU-wise QMD curves for PCT/CT scaffolding until observed or Nemora-derived curves are supplied."
